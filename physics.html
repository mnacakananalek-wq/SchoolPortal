<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Физика — Школьный портал</title>
  <link rel="stylesheet" href="styles (1).css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="./index (1).html">Школьный портал</a>
      <nav class="nav">
        <a href="./index (1).html" class="nav-link">Главная</a>
        <a href="./subjects (1).html" class="nav-link">Учебные материалы</a>
        <a href="./contact (1).html" class="nav-link">Связь</a>
      </nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn" title="Меню">☰</button>
      <div class="mobile-dropdown" id="mobileDropdown">
        <a href="./index (1).html" class="nav-link">Главная</a>
        <a href="./subjects (1).html" class="nav-link">Учебные материалы</a>
        <a href="./contact (1).html" class="nav-link">Связь</a>
      </div>
      <button class="theme-toggle" data-toggle-theme title="Переключить тему">
        <span class="toggle-slider"></span>
      </button>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumbs">
      <a class="link" href="subjects (1).html">← Назад к предметам</a>
      <span style="color: var(--muted);"> / Физика</span>
    </div>
    <h1 class="section-title">Физика</h1>

    <div data-tabs>
      <div class="tabs">
        <button class="tab active" data-tab="theory">Теория</button>
        <button class="tab" data-tab="interactive">Интерактивная часть</button>
      </div>
      <div class="tabpanes">
        <section class="active" data-pane="theory">
          <div class="card">
          <h3 class="card-title">📚 Теория по физике</h3>
          <div class="tools-row" style="gap:8px; flex-wrap: wrap;">
          <label for="class-select" class="sr-only">Выбор класса</label>
          <select id="class-select" class="input" style="max-width: 260px;">
          <option value="all">Вся теория</option>
          <option value="7">7 класс</option>
          <option value="8">8 класс</option>
          <option value="9">9 класс</option>
          <option value="10">10 класс</option>
          <option value="11">11 класс</option>
          </select>
          <input id="theory-search" class="input" placeholder="Поиск по теории (например: закон Ома, импульс, оптика)" />
          </div>
          
          <div id="theory-container" class="card-text"></div>
          </div>
        </section>

        <section data-pane="interactive">
          <div class="card">
            <h3 class="card-title">📖 Справочник физических величин</h3>
            <div class="tools-row">
              <input class="input" id="q" placeholder="Фильтр (кинематика, сила, t...)" />
            </div>
            <div class="table-wrap">
              <table class="table" id="tbl">
                <thead><tr><th>Название</th><th>Символ</th><th>Единица</th><th>Раздел</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
            <button id="back-btn" class="back-btn" style="display: none;">← Назад к таблице</button>
            <div id="details" class="card" style="margin-top:12px; display:none;"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Школьный портал</p>
      <a class="link" href="./contact (1).html">Связаться с нами</a>
    </div>
  </footer>

  <script>
    // Справочник физических величин (нижняя вкладка)
    const data = [
      // Кинематика
      { sym: 't', name: 'Время', unit: 'с', section: 'Кинематика', def: 'Длительность события.', formulas: ['v = s/t'] },
      { sym: 's', name: 'Путь', unit: 'м', section: 'Кинематика', def: 'Длина траектории.', formulas: ['s = v·t'] },
      { sym: 'v', name: 'Скорость', unit: 'м/с', section: 'Кинематика', def: 'Быстрота движения.', formulas: ['v = s/t'] },
      { sym: 'a', name: 'Ускорение', unit: 'м/с²', section: 'Кинематика', def: 'Изменение скорости.', formulas: ['a = Δv/Δt'] },
      { sym: 'x', name: 'Координата', unit: 'м', section: 'Кинематика', def: 'Положение точки в пространстве.', formulas: ['x = x₀ + v·t'] },
      { sym: 'Δx', name: 'Перемещение', unit: 'м', section: 'Кинематика', def: 'Вектор перемещения.', formulas: ['Δx = x - x₀'] },
      { sym: 'ω', name: 'Угловая скорость', unit: 'рад/с', section: 'Кинематика', def: 'Скорость вращения.', formulas: ['ω = 2π/T'] },
      { sym: 'T', name: 'Период', unit: 'с', section: 'Кинематика', def: 'Время полного оборота.', formulas: ['T = 1/ν'] },
      { sym: 'ν', name: 'Частота', unit: 'Гц', section: 'Кинематика', def: 'Число колебаний в секунду.', formulas: ['ν = 1/T'] },
      { sym: 'n', name: 'Частота вращения', unit: 'об/мин', section: 'Кинематика', def: 'Число оборотов в минуту.', formulas: ['n = 60/T'] },
      
      // Динамика
      { sym: 'F', name: 'Сила', unit: 'Н', section: 'Динамика', def: 'Взаимодействие тел.', formulas: ['F = m·a'] },
      { sym: 'm', name: 'Масса', unit: 'кг', section: 'Динамика', def: 'Инертность тела.', formulas: ['F = m·a'] },
      { sym: 'p', name: 'Импульс', unit: 'кг·м/с', section: 'Динамика', def: 'Мера механического движения.', formulas: ['p = m·v'] },
      { sym: 'Fтр', name: 'Сила трения', unit: 'Н', section: 'Динамика', def: 'Сила сопротивления движению.', formulas: ['Fтр = μ·N'] },
      { sym: 'Fупр', name: 'Сила упругости', unit: 'Н', section: 'Динамика', def: 'Сила восстановления формы.', formulas: ['Fупр = k·Δx'] },
      { sym: 'Fтяж', name: 'Сила тяжести', unit: 'Н', section: 'Динамика', def: 'Гравитационное притяжение.', formulas: ['Fтяж = m·g'] },
      { sym: 'P', name: 'Вес', unit: 'Н', section: 'Динамика', def: 'Сила давления на опору.', formulas: ['P = m·g'] },
      { sym: 'N', name: 'Сила реакции опоры', unit: 'Н', section: 'Динамика', def: 'Сила противодействия.', formulas: ['N = -P'] },
      { sym: 'k', name: 'Жёсткость', unit: 'Н/м', section: 'Динамика', def: 'Коэффициент упругости.', formulas: ['k = F/Δx'] },
      { sym: 'μ', name: 'Коэффициент трения', unit: 'безразм.', section: 'Динамика', def: 'Отношение сил трения и реакции.', formulas: ['μ = Fтр/N'] },
      { sym: 'g', name: 'Ускорение свободного падения', unit: 'м/с²', section: 'Динамика', def: 'Ускорение у Земли.', formulas: ['g ≈ 9.8 м/с²'] },
      { sym: 'G', name: 'Гравитационная постоянная', unit: 'Н·м²/кг²', section: 'Динамика', def: 'Константа в законе всемирного тяготения.', formulas: ['G = 6.67·10⁻¹¹'] },
      { sym: 'M', name: 'Момент силы', unit: 'Н·м', section: 'Динамика', def: 'Вращающее действие силы.', formulas: ['M = F·d'] },
      { sym: 'I', name: 'Момент инерции', unit: 'кг·м²', section: 'Динамика', def: 'Мера инертности при вращении.', formulas: ['I = Σmᵢrᵢ²'] },
      { sym: 'L', name: 'Момент импульса', unit: 'кг·м²/с', section: 'Динамика', def: 'Момент количества движения.', formulas: ['L = I·ω'] },
      
      // Механика (давление, работа, энергия)
      { sym: 'p', name: 'Давление', unit: 'Па', section: 'Механика', def: 'Сила на единицу площади.', formulas: ['p = F/S'] },
      { sym: 'S', name: 'Площадь', unit: 'м²', section: 'Механика', def: 'Поверхность тела.', formulas: ['S = a·b'] },
      { sym: 'V', name: 'Объём', unit: 'м³', section: 'Механика', def: 'Занимаемое пространство.', formulas: ['V = S·h'] },
      { sym: 'ρ', name: 'Плотность', unit: 'кг/м³', section: 'Механика', def: 'Масса на единицу объёма.', formulas: ['ρ = m/V'] },
      { sym: 'A', name: 'Работа', unit: 'Дж', section: 'Механика', def: 'Скалярное произведение силы и перемещения.', formulas: ['A = F·s·cosα'] },
      { sym: 'N', name: 'Мощность', unit: 'Вт', section: 'Механика', def: 'Работа в единицу времени.', formulas: ['N = A/t'] },
      { sym: 'E', name: 'Энергия', unit: 'Дж', section: 'Механика', def: 'Способность совершать работу.', formulas: ['E = A'] },
      { sym: 'Eк', name: 'Кинетическая энергия', unit: 'Дж', section: 'Механика', def: 'Энергия движения.', formulas: ['Eк = m·v²/2'] },
      { sym: 'Eп', name: 'Потенциальная энергия', unit: 'Дж', section: 'Механика', def: 'Энергия положения.', formulas: ['Eп = m·g·h'] },
      { sym: 'h', name: 'Высота', unit: 'м', section: 'Механика', def: 'Вертикальное расстояние.', formulas: ['Eп = m·g·h'] },
      { sym: 'η', name: 'КПД', unit: '%', section: 'Механика', def: 'Коэффициент полезного действия.', formulas: ['η = Aпол/Aзат·100%'] },
      { sym: 'Fарх', name: 'Сила Архимеда', unit: 'Н', section: 'Механика', def: 'Выталкивающая сила в жидкости.', formulas: ['Fарх = ρ·g·V'] },
      
      // Термодинамика
      { sym: 'T', name: 'Температура', unit: 'К', section: 'Термодинамика', def: 'Мера теплового состояния.', formulas: ['T = t + 273.15'] },
      { sym: 't', name: 'Температура', unit: '°C', section: 'Термодинамика', def: 'Температура по Цельсию.', formulas: ['t = T - 273.15'] },
      { sym: 'Q', name: 'Количество теплоты', unit: 'Дж', section: 'Термодинамика', def: 'Энергия теплообмена.', formulas: ['Q = c·m·Δt'] },
      { sym: 'c', name: 'Удельная теплоёмкость', unit: 'Дж/(кг·К)', section: 'Термодинамика', def: 'Теплота на градус и килограмм.', formulas: ['c = Q/(m·Δt)'] },
      { sym: 'λ', name: 'Удельная теплота плавления', unit: 'Дж/кг', section: 'Термодинамика', def: 'Теплота на единицу массы при плавлении.', formulas: ['Q = λ·m'] },
      { sym: 'r', name: 'Удельная теплота парообразования', unit: 'Дж/кг', section: 'Термодинамика', def: 'Теплота на единицу массы при испарении.', formulas: ['Q = r·m'] },
      { sym: 'q', name: 'Удельная теплота сгорания', unit: 'Дж/кг', section: 'Термодинамика', def: 'Энергия сгорания топлива.', formulas: ['Q = q·m'] },
      { sym: 'U', name: 'Внутренняя энергия', unit: 'Дж', section: 'Термодинамика', def: 'Суммарная энергия частиц.', formulas: ['ΔU = Q - A'] },
      { sym: 'S', name: 'Энтропия', unit: 'Дж/К', section: 'Термодинамика', def: 'Мера беспорядка системы.', formulas: ['ΔS = Q/T'] },
      { sym: 'k', name: 'Постоянная Больцмана', unit: 'Дж/К', section: 'Термодинамика', def: 'Связь температуры и энергии.', formulas: ['k = 1.38·10⁻²³ Дж/К'] },
      { sym: 'R', name: 'Универсальная газовая постоянная', unit: 'Дж/(моль·К)', section: 'Термодинамика', def: 'Постоянная в уравнении Менделеева.', formulas: ['R = 8.31 Дж/(моль·К)'] },
      { sym: 'n', name: 'Количество вещества', unit: 'моль', section: 'Термодинамика', def: 'Число молекул в молях.', formulas: ['n = m/M'] },
      { sym: 'M', name: 'Молярная масса', unit: 'кг/моль', section: 'Термодинамика', def: 'Масса одного моля.', formulas: ['M = m/n'] },
      { sym: 'Vм', name: 'Молярный объём', unit: 'м³/моль', section: 'Термодинамика', def: 'Объём одного моля газа.', formulas: ['Vм = 22.4 л/моль'] },
      { sym: 'p', name: 'Давление газа', unit: 'Па', section: 'Термодинамика', def: 'Сила ударов молекул.', formulas: ['p = nkT'] },
      { sym: 'γ', name: 'Показатель адиабаты', unit: 'безразм.', section: 'Термодинамика', def: 'Отношение теплоёмкостей.', formulas: ['γ = Cp/Cv'] },
      
      // Электричество
      { sym: 'I', name: 'Сила тока', unit: 'А', section: 'Электричество', def: 'Поток заряда.', formulas: ['I = q/t'] },
      { sym: 'U', name: 'Напряжение', unit: 'В', section: 'Электричество', def: 'Работа на единицу заряда.', formulas: ['U = A/q'] },
      { sym: 'R', name: 'Сопротивление', unit: 'Ом', section: 'Электричество', def: 'Препятствование току.', formulas: ['R = U/I'] },
      { sym: 'q', name: 'Заряд', unit: 'Кл', section: 'Электричество', def: 'Электрический заряд.', formulas: ['q = I·t'] },
      { sym: 'e', name: 'Элементарный заряд', unit: 'Кл', section: 'Электричество', def: 'Заряд электрона.', formulas: ['e = 1.6·10⁻¹⁹ Кл'] },
      { sym: 'C', name: 'Электрическая ёмкость', unit: 'Ф', section: 'Электричество', def: 'Способность накапливать заряд.', formulas: ['C = q/U'] },
      { sym: 'W', name: 'Энергия конденсатора', unit: 'Дж', section: 'Электричество', def: 'Энергия электрического поля.', formulas: ['W = CU²/2'] },
      { sym: 'P', name: 'Мощность тока', unit: 'Вт', section: 'Электричество', def: 'Работа тока в единицу времени.', formulas: ['P = U·I'] },
      { sym: 'A', name: 'Работа тока', unit: 'Дж', section: 'Электричество', def: 'Энергия электрического тока.', formulas: ['A = U·I·t'] },
      { sym: 'ρ', name: 'Удельное сопротивление', unit: 'Ом·м', section: 'Электричество', def: 'Сопротивление материала.', formulas: ['R = ρ·l/S'] },
      { sym: 'G', name: 'Проводимость', unit: 'См', section: 'Электричество', def: 'Обратная величина сопротивления.', formulas: ['G = 1/R'] },
      { sym: 'σ', name: 'Удельная проводимость', unit: 'См/м', section: 'Электричество', def: 'Проводимость материала.', formulas: ['σ = 1/ρ'] },
      { sym: 'ε', name: 'Диэлектрическая проницаемость', unit: 'безразм.', section: 'Электричество', def: 'Свойство среды.', formulas: ['C = ε·C₀'] },
      { sym: 'φ', name: 'Потенциал', unit: 'В', section: 'Электричество', def: 'Работа на единицу заряда.', formulas: ['φ = W/q'] },
      { sym: 'E', name: 'Напряжённость поля', unit: 'В/м', section: 'Электричество', def: 'Сила на единицу заряда.', formulas: ['E = F/q'] },
      { sym: 'D', name: 'Электрическое смещение', unit: 'Кл/м²', section: 'Электричество', def: 'Плотность заряда.', formulas: ['D = ε·E'] },
      
      // Магнетизм
      { sym: 'B', name: 'Магнитная индукция', unit: 'Тл', section: 'Магнетизм', def: 'Сила магнитного поля.', formulas: ['F = I·l·B'] },
      { sym: 'Φ', name: 'Магнитный поток', unit: 'Вб', section: 'Магнетизм', def: 'Поток магнитного поля.', formulas: ['Φ = B·S'] },
      { sym: 'H', name: 'Напряжённость магнитного поля', unit: 'А/м', section: 'Магнетизм', def: 'Магнитная сила.', formulas: ['H = B/μ'] },
      { sym: 'μ', name: 'Магнитная проницаемость', unit: 'Гн/м', section: 'Магнетизм', def: 'Свойство среды.', formulas: ['B = μ·H'] },
      { sym: 'μ₀', name: 'Магнитная постоянная', unit: 'Гн/м', section: 'Магнетизм', def: 'Постоянная в вакууме.', formulas: ['μ₀ = 4π·10⁻⁷ Гн/м'] },
      { sym: 'L', name: 'Индуктивность', unit: 'Гн', section: 'Магнетизм', def: 'Способность создавать ЭДС.', formulas: ['L = Φ/I'] },
      { sym: 'ε', name: 'ЭДС индукции', unit: 'В', section: 'Магнетизм', def: 'Электродвижущая сила.', formulas: ['ε = -dΦ/dt'] },
      { sym: 'M', name: 'Взаимная индуктивность', unit: 'Гн', section: 'Магнетизм', def: 'Индуктивность между катушками.', formulas: ['M = Φ₁₂/I₁'] },
      { sym: 'W', name: 'Энергия магнитного поля', unit: 'Дж', section: 'Магнетизм', def: 'Энергия в катушке.', formulas: ['W = LI²/2'] },
      
      // Колебания и волны
      { sym: 'A', name: 'Амплитуда', unit: 'м', section: 'Колебания', def: 'Максимальное отклонение.', formulas: ['x = A·cos(ωt)'] },
      { sym: 'ω', name: 'Циклическая частота', unit: 'рад/с', section: 'Колебания', def: 'Угловая скорость колебаний.', formulas: ['ω = 2π/T'] },
      { sym: 'φ', name: 'Начальная фаза', unit: 'рад', section: 'Колебания', def: 'Начальное положение.', formulas: ['x = A·cos(ωt + φ)'] },
      { sym: 'T', name: 'Период колебаний', unit: 'с', section: 'Колебания', def: 'Время полного цикла.', formulas: ['T = 2π/ω'] },
      { sym: 'ν', name: 'Частота колебаний', unit: 'Гц', section: 'Колебания', def: 'Число колебаний в секунду.', formulas: ['ν = 1/T'] },
      { sym: 'λ', name: 'Длина волны', unit: 'м', section: 'Волны', def: 'Расстояние между соседними гребнями.', formulas: ['λ = v/ν'] },
      { sym: 'v', name: 'Скорость волны', unit: 'м/с', section: 'Волны', def: 'Скорость распространения.', formulas: ['v = λ·ν'] },
      { sym: 'k', name: 'Волновое число', unit: 'рад/м', section: 'Волны', def: 'Пространственная частота.', formulas: ['k = 2π/λ'] },
      
      // Оптика
      { sym: 'c', name: 'Скорость света', unit: 'м/с', section: 'Оптика', def: 'Скорость света в вакууме.', formulas: ['c = 3·10⁸ м/с'] },
      { sym: 'n', name: 'Показатель преломления', unit: 'безразм.', section: 'Оптика', def: 'Отношение скоростей света.', formulas: ['n = c/v'] },
      { sym: 'α', name: 'Угол падения', unit: '°', section: 'Оптика', def: 'Угол между лучом и нормалью.', formulas: ['α = β'] },
      { sym: 'β', name: 'Угол преломления', unit: '°', section: 'Оптика', def: 'Угол преломлённого луча.', formulas: ['n₁sinα = n₂sinβ'] },
      { sym: 'f', name: 'Фокусное расстояние', unit: 'м', section: 'Оптика', def: 'Расстояние до фокуса.', formulas: ['1/f = 1/d + 1/d\''] },
      { sym: 'd', name: 'Расстояние до предмета', unit: 'м', section: 'Оптика', def: 'Расстояние от линзы до объекта.', formulas: ['1/f = 1/d + 1/d\''] },
      { sym: 'd\'', name: 'Расстояние до изображения', unit: 'м', section: 'Оптика', def: 'Расстояние от линзы до изображения.', formulas: ['1/f = 1/d + 1/d\''] },
      { sym: 'Γ', name: 'Увеличение', unit: 'безразм.', section: 'Оптика', def: 'Отношение размеров.', formulas: ['Γ = d\'/d'] },
      { sym: 'h', name: 'Планка постоянная', unit: 'Дж·с', section: 'Оптика', def: 'Квантовая постоянная.', formulas: ['h = 6.63·10⁻³⁴ Дж·с'] },
      { sym: 'E', name: 'Энергия фотона', unit: 'Дж', section: 'Оптика', def: 'Энергия кванта света.', formulas: ['E = h·ν'] },
      { sym: 'p', name: 'Импульс фотона', unit: 'кг·м/с', section: 'Оптика', def: 'Момент фотона.', formulas: ['p = h/λ'] },

    const q = document.getElementById('q');

    function render(list) {
      tbody.innerHTML = list.map((r,i) => `
        <tr><td><button class="btn btn-ghost" data-i="${i}">${r.name}</button></td>
        <td><span class="kbd">${r.sym}</span></td><td>${r.unit}</td><td>${r.section}</td></tr>
      `).join('');
      tbody.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => show(+btn.dataset.i)));
    }

    function show(i) {
      const r = (q.value.trim() ? filtered : data)[i];
      details.style.display = 'block';
      details.innerHTML = `<h3 class="card-title">${r.name} (${r.sym})</h3>
        <p class="card-text">${r.def}</p><p class="card-text"><strong>Ед.:</strong> ${r.unit} | <strong>Раздел:</strong> ${r.section}</p>
        <div class="tools-row">${r.formulas.map(f => `<span class="kbd">${f}</span>`).join('')}</div>`;
      document.getElementById('back-btn').style.display = 'inline-block';
      details.scrollIntoView({ behavior: 'smooth' });
    }

    let filtered = data.slice();
    render(filtered);
    q.addEventListener('input', () => {
      const s = q.value.toLowerCase();
      filtered = data.filter(r => r.name.toLowerCase().includes(s) || r.section.toLowerCase().includes(s) || r.sym.toLowerCase().includes(s));
      render(filtered);
      details.style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      document.querySelector('.table').scrollIntoView({ behavior: 'smooth' });
    });

    const classSelect = document.getElementById('class-select');
    const theorySearch = document.getElementById('theory-search');
    const theoryContainer = document.getElementById('theory-container');

    function renderTheory() {
      const cls = classSelect.value;
      const query = (theorySearch.value || '').toLowerCase();
      const keys = cls === 'all' ? Object.keys(theory) : [cls];
      let items = [];
      keys.forEach(k => {
        theory[k].forEach(t => items.push({ ...t, grade: k }));
      });
      if (query) {
        items = items.filter(it => it.title.toLowerCase().includes(query) || it.body.toLowerCase().includes(query));
      }
      if (!items.length) {
        theoryContainer.innerHTML = '<p class="muted">Ничего не найдено. Измените запрос поиска или выберите другой класс.</p>';
        return;
      }
      const grouped = items.reduce((acc, it) => {
        (acc[it.grade] ||= []).push(it);
        return acc;
      }, {});
      theoryContainer.innerHTML = Object.keys(grouped).sort((a,b)=>+a-+b).map(k => `
        <div class="subsection">
          <h4 class="subsection-title">${k === 'all' ? 'Вся теория' : k + ' класс'}</h4>
          ${grouped[k].map((it, idx) => `
            <details ${items.length<=6 ? 'open' : ''}>
              <summary><strong>${it.title}</strong></summary>
              <div class="prose"><p>${it.body}</p></div>
            </details>
          `).join('')}
        </div>
      `).join('');
    }

    classSelect.addEventListener('change', renderTheory);
    theorySearch.addEventListener('input', renderTheory);
    renderTheory();
  </script>
